# ========= DEV PROFILE =========
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/user_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator - common useful endpoints in dev
management.endpoints.web.exposure.include=health,info,metrics,threaddump,heapdump,loggers,env,prometheus
management.endpoint.health.show-details=always

info.app.name=User Service
info.app.profile=dev

# JWT
app.jwt.secret-base64=ZHVtbXktc2VjcmV0LWJhc2U2NC1jaGFuZ2UtbWUtMTIzNDU2Nzg5MDEyMzQ1Njc4OTA=
app.jwt.expiration-ms=1800000